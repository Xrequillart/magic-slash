name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate commits
        run: |
          npx commitlint \
            --from ${{ github.event.pull_request.base.sha }} \
            --to ${{ github.event.pull_request.head.sha }} \
            --verbose

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "./install"
          severity: warning

      - name: Run yamllint
        run: |
          pip install --break-system-packages yamllint
          npm run lint:yaml

      - name: Run ESLint
        run: npm run lint:js

  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate YAML files
        run: |
          for file in .github/workflows/*.yml .github/ISSUE_TEMPLATE/*.yml .github/dependabot.yml; do
            if [ -f "$file" ]; then
              echo "Validating $file..."
              python3 -c "import yaml; yaml.safe_load(open('$file'))" || exit 1
            fi
          done

      - name: Check shell scripts syntax
        run: |
          for script in install/*.sh; do
            echo "Checking $script..."
            bash -n "$script" || exit 1
          done

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install desktop dependencies
        run: npm run desktop:install

      - name: Typecheck desktop
        run: cd desktop && npx tsc --noEmit

  install-test:
    name: Installation Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install jq
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y jq
          elif [ "$RUNNER_OS" == "macOS" ]; then
            brew install jq
          fi
        shell: bash

      - name: Verify prerequisites check
        run: |
          # Test that the script correctly identifies missing prerequisites
          # (claude won't be installed in CI, so it should fail with actionable message)
          OUTPUT=$(bash install/install.sh 2>&1 || true)
          echo "$OUTPUT"
          # Should mention the missing tool name
          echo "$OUTPUT" | grep -q "claude" || { echo "FAIL: output should mention 'claude'"; exit 1; }
          # Should include an install suggestion
          HAS_HINT=false
          echo "$OUTPUT" | grep -q "Install:" && HAS_HINT=true
          echo "$OUTPUT" | grep -q "claude.ai/download" && HAS_HINT=true
          [ "$HAS_HINT" = true ] || { echo "FAIL: should include install suggestion"; exit 1; }
          # Should report missing prerequisites
          echo "$OUTPUT" | grep -q "prerequisites" || { echo "FAIL: output should mention prerequisites"; exit 1; }
        shell: bash

      - name: Test --dry-run flag
        run: |
          # --dry-run should exit 0 (preflight will still fail for missing claude)
          # but we can verify it prints the dry-run banner before failing
          OUTPUT=$(bash install/install.sh --dry-run 2>&1 || true)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "\[DRY RUN\]" || { echo "FAIL: output should contain [DRY RUN]"; exit 1; }
        shell: bash
